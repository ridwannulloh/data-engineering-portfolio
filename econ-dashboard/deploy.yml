# .github/workflows/deploy.yml
# ─────────────────────────────────────────────────────────────────
# Auto-deploys to Cloud Run on every push to main branch.
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   GCP_PROJECT_ID      — your GCP project ID
#   GCP_SA_KEY          — base64-encoded service account JSON key
# ─────────────────────────────────────────────────────────────────

name: Deploy to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - 'econ-dashboard/**'   # only trigger on changes inside this folder
  workflow_dispatch:           # allow manual trigger from GitHub UI

env:
  PROJECT_ID:   ${{ secrets.GCP_PROJECT_ID }}
  REGION:       us-central1
  SERVICE_NAME: econ-dashboard
  IMAGE:        gcr.io/${{ secrets.GCP_PROJECT_ID }}/econ-dashboard

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Authenticate with GCP ───────────────────────────────────
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # ── Setup gcloud CLI ────────────────────────────────────────
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # ── Configure Docker to use GCR ─────────────────────────────
      - name: Configure Docker
        run: gcloud auth configure-docker --quiet

      # ── Build Docker image ──────────────────────────────────────
      - name: Build image
        working-directory: econ-dashboard
        run: |
          docker build \
            --tag ${{ env.IMAGE }}:${{ github.sha }} \
            --tag ${{ env.IMAGE }}:latest \
            .

      # ── Push to Container Registry ──────────────────────────────
      - name: Push image
        run: |
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

      # ── Deploy to Cloud Run ─────────────────────────────────────
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image ${{ env.IMAGE }}:${{ github.sha }} \
            --platform managed \
            --region ${{ env.REGION }} \
            --allow-unauthenticated \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 3 \
            --port 8080 \
            --set-env-vars "GCP_PROJECT_ID=${{ env.PROJECT_ID }}" \
            --quiet

      # ── Print deployed URL ──────────────────────────────────────
      - name: Get service URL
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --platform managed \
            --region ${{ env.REGION }} \
            --format "value(status.url)")
          echo "✅ Deployed to: $URL"
          echo "SERVICE_URL=$URL" >> $GITHUB_ENV

      # ── Smoke test ──────────────────────────────────────────────
      - name: Smoke test
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ env.SERVICE_URL }}")
          if [ "$STATUS" = "200" ]; then
            echo "✅ Service returned HTTP 200 — OK"
          else
            echo "❌ Service returned HTTP $STATUS"
            exit 1
          fi
